services:
  meeting-backend:
    container_name: meeting-backend
    image: debian:bookworm-slim
    restart: unless-stopped
    ports:
      - "127.0.0.1:5180:5180"
    volumes:
      - ./backend:/app/backend:ro
      - ./data:/data
      - ./logs:/logs
      - /etc/ssl/certs:/etc/ssl/certs:ro
    environment:
      MEETING_HTTP_ADDR: ":5180"
      MEETING_SQLITE_PATH: /data/meeting.db
      MEETING_LOG_DIR: /logs
    command:
      - /app/backend/meeting

  meeting-frontend:
    container_name: meeting-frontend
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5188:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  meeting-coturn:
    container_name: meeting-coturn
    image: ${COTURN_IMAGE:-coturn/coturn:latest}
    restart: unless-stopped
    command:
      - turnserver
      - -c
      - /etc/coturn/turnserver.conf
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "49152-49200:49152-49200/tcp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

